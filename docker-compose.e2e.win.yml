version: "3.1"

services:
  proxy:
    image: traefik:windowsservercore-1809 # The official Traefik docker image
    command: --api.insecure=true --providers.docker.endpoint=npipe:////./pipe/docker_engine # Enables the web UI and tells Traefik to listen to docker
    ports:
      - "8081:80" # The HTTP port
      - "8082:8080" # The Web UI (enabled by --api)
    volumes:
      - type: npipe
        source: \\.\pipe\docker_engine
        target: \\.\pipe\docker_engine

  frontend:
    image: "duo-frontend-win:${BUILD_TAG}"
    labels:
      - "traefik.frontend.rule=PathPrefix:/"
      - "traefik.port=80"
    depends_on:
      - backend

